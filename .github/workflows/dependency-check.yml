name: Dependency Lockfile Check

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'

jobs:
  verify-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Matches one of your supported versions
          cache: 'pip'

      - name: Install pip-tools
        run: python -m pip install --upgrade pip pip-tools

      - name: Compile pyproject.toml
        # This generates a temporary requirements.txt based on the PR's pyproject.toml
        run: pip-compile pyproject.toml --output-file requirements.txt

      - name: Check for differences
        # If the newly generated file differs from the committed one, the CI fails
        run: |
          if ! git diff --exit-code requirements.txt; then
            echo "::error::requirements.txt is out of sync with pyproject.toml!"
            echo "::error::Please run 'pip-compile pyproject.toml' locally and commit the updated requirements.txt."
            exit 1
          fi
