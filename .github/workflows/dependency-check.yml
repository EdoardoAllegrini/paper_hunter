name: Dependency Lockfile Check

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'

jobs:
  verify-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 1. Install uv instead of pip-tools
      - name: Install uv
        run: python -m pip install uv

      # 2. Run the exact same command you ran locally
      - name: Compile pyproject.toml
        run: uv pip compile pyproject.toml -o requirements.txt --universal

      - name: Check for differences
        run: |
          if ! git diff --exit-code requirements.txt; then
            echo "::error::requirements.txt is out of sync with pyproject.toml!"
            echo "::error::Please run 'uv pip compile pyproject.toml -o requirements.txt --universal' locally and commit the result."
            exit 1
          fi
